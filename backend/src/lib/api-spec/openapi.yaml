openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Splitsvilla AI API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: contestants
    description: Contestant management
  - name: splits
    description: Split/pairing management
  - name: tasks
    description: Villa tasks and challenges
  - name: votes
    description: Voting and elimination
  - name: compatibility
    description: AI compatibility and Oracle predictions
  - name: gemini
    description: Gemini AI chat and image operations
  - name: events
    description: Villa activity feed and event tracking
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /contestants:
    get:
      operationId: listContestants
      tags: [contestants]
      summary: List all contestants
      responses:
        "200":
          description: List of contestants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contestant"
    post:
      operationId: createContestant
      tags: [contestants]
      summary: Add a new contestant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContestantBody"
      responses:
        "201":
          description: Created contestant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contestant"

  /contestants/{id}:
    get:
      operationId: getContestant
      tags: [contestants]
      summary: Get a contestant by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contestant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contestant"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateContestant
      tags: [contestants]
      summary: Update a contestant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContestantBody"
      responses:
        "200":
          description: Updated contestant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contestant"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteContestant
      tags: [contestants]
      summary: Remove a contestant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /splits:
    get:
      operationId: listSplits
      tags: [splits]
      summary: List all splits/pairings
      responses:
        "200":
          description: List of splits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Split"
    post:
      operationId: createSplit
      tags: [splits]
      summary: Create a split pairing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSplitBody"
      responses:
        "201":
          description: Created split
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Split"

  /splits/{id}:
    delete:
      operationId: deleteSplit
      tags: [splits]
      summary: Break a split
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List all tasks/challenges
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task/challenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskBody"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    put:
      operationId: updateTask
      tags: [tasks]
      summary: Update task result
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskBody"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /votes:
    get:
      operationId: listVotes
      tags: [votes]
      summary: List all votes
      responses:
        "200":
          description: List of votes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vote"
    post:
      operationId: castVote
      tags: [votes]
      summary: Cast a vote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CastVoteBody"
      responses:
        "201":
          description: Vote cast
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vote"

  /compatibility/analyze:
    post:
      operationId: analyzeCompatibility
      tags: [compatibility]
      summary: AI-powered compatibility analysis between two contestants
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompatibilityAnalysisBody"
      responses:
        "200":
          description: Compatibility analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompatibilityResult"

  /compatibility/oracle:
    post:
      operationId: oraclePrediction
      tags: [compatibility]
      summary: Oracle AI prediction for a split/couple
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OraclePredictionBody"
      responses:
        "200":
          description: Oracle prediction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OraclePrediction"

  /compatibility/ml-score:
    post:
      operationId: mlCompatibilityScore
      tags: [compatibility]
      summary: ML-based compatibility score between two contestants
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MlScoreBody"
      responses:
        "200":
          description: ML compatibility score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MlScoreResult"

  /compatibility/leaderboard:
    get:
      operationId: getLeaderboard
      tags: [compatibility]
      summary: Get couple compatibility leaderboard
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  /gemini/conversations:
    get:
      operationId: listGeminiConversations
      tags: [gemini]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeminiConversation"
    post:
      operationId: createGeminiConversation
      tags: [gemini]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGeminiConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiConversation"
  /gemini/conversations/{id}:
    get:
      operationId: getGeminiConversation
      tags: [gemini]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiError"
    delete:
      operationId: deleteGeminiConversation
      tags: [gemini]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiError"
  /gemini/conversations/{id}/messages:
    get:
      operationId: listGeminiMessages
      tags: [gemini]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeminiMessage"
    post:
      operationId: sendGeminiMessage
      tags: [gemini]
      summary: Send a message and receive an AI response (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendGeminiMessageBody"
      responses:
        "200":
          description: SSE stream of assistant response chunks
          content:
            text/event-stream: {}
  /gemini/generate-image:
    post:
      operationId: generateGeminiImage
      tags: [gemini]
      summary: Generate an image from a text prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateGeminiImageBody"
      responses:
        "200":
          description: Generated image data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateGeminiImageResponse"

  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List recent villa events
      description: Returns recent villa activity events ordered by most recent first
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VillaEvent"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Contestant:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        age:
          type: integer
        hometown:
          type: string
        bio:
          type: string
        zodiacSign:
          type: string
        personality:
          type: string
          description: "Comma-separated personality traits e.g. outgoing,adventurous,loyal"
        interests:
          type: string
          description: "Comma-separated interests"
        status:
          type: string
          enum: [active, dumped, winner]
        gender:
          type: string
          enum: [male, female, other]
        currentSplitId:
          type: integer
          nullable: true
        compatibilityScore:
          type: number
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - age
        - hometown
        - bio
        - zodiacSign
        - personality
        - interests
        - status
        - gender
        - createdAt

    CreateContestantBody:
      type: object
      properties:
        name:
          type: string
        age:
          type: integer
        hometown:
          type: string
        bio:
          type: string
        zodiacSign:
          type: string
        personality:
          type: string
        interests:
          type: string
        gender:
          type: string
          enum: [male, female, other]
      required:
        - name
        - age
        - hometown
        - bio
        - zodiacSign
        - personality
        - interests
        - gender

    Split:
      type: object
      properties:
        id:
          type: integer
        contestant1Id:
          type: integer
        contestant2Id:
          type: integer
        contestant1Name:
          type: string
        contestant2Name:
          type: string
        compatibilityScore:
          type: number
          nullable: true
        oraclePrediction:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, broken, winner]
        formedAt:
          type: string
          format: date-time
      required:
        - id
        - contestant1Id
        - contestant2Id
        - contestant1Name
        - contestant2Name
        - status
        - formedAt

    CreateSplitBody:
      type: object
      properties:
        contestant1Id:
          type: integer
        contestant2Id:
          type: integer
      required:
        - contestant1Id
        - contestant2Id

    Task:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        taskType:
          type: string
          enum: [physical, mental, creative, romantic, elimination]
        winnerIds:
          type: string
          nullable: true
          description: "Comma-separated winner contestant IDs"
        status:
          type: string
          enum: [upcoming, ongoing, completed]
        scheduledAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - description
        - taskType
        - status
        - createdAt

    CreateTaskBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        taskType:
          type: string
          enum: [physical, mental, creative, romantic, elimination]
        scheduledAt:
          type: string
          format: date-time
          nullable: true
      required:
        - title
        - description
        - taskType

    UpdateTaskBody:
      type: object
      properties:
        status:
          type: string
          enum: [upcoming, ongoing, completed]
        winnerIds:
          type: string
          nullable: true
      required:
        - status

    Vote:
      type: object
      properties:
        id:
          type: integer
        voterContestantId:
          type: integer
        nominatedContestantId:
          type: integer
        voterName:
          type: string
        nominatedName:
          type: string
        reason:
          type: string
          nullable: true
        round:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - voterContestantId
        - nominatedContestantId
        - voterName
        - nominatedName
        - round
        - createdAt

    CastVoteBody:
      type: object
      properties:
        voterContestantId:
          type: integer
        nominatedContestantId:
          type: integer
        reason:
          type: string
          nullable: true
        round:
          type: integer
      required:
        - voterContestantId
        - nominatedContestantId
        - round

    CompatibilityAnalysisBody:
      type: object
      properties:
        contestant1Id:
          type: integer
        contestant2Id:
          type: integer
      required:
        - contestant1Id
        - contestant2Id

    CompatibilityResult:
      type: object
      properties:
        contestant1Name:
          type: string
        contestant2Name:
          type: string
        overallScore:
          type: number
          description: "Score from 0 to 100"
        personalityMatch:
          type: number
        interestMatch:
          type: number
        zodiacMatch:
          type: number
        analysis:
          type: string
        strengths:
          type: array
          items:
            type: string
        challenges:
          type: array
          items:
            type: string
        recommendation:
          type: string
      required:
        - contestant1Name
        - contestant2Name
        - overallScore
        - personalityMatch
        - interestMatch
        - zodiacMatch
        - analysis
        - strengths
        - challenges
        - recommendation

    OraclePredictionBody:
      type: object
      properties:
        contestant1Id:
          type: integer
        contestant2Id:
          type: integer
      required:
        - contestant1Id
        - contestant2Id

    OraclePrediction:
      type: object
      properties:
        prediction:
          type: string
        verdict:
          type: string
          enum: [strong_match, possible_match, uncertain, unlikely_match]
        confidence:
          type: number
        mysticalMessage:
          type: string
        advice:
          type: string
      required:
        - prediction
        - verdict
        - confidence
        - mysticalMessage
        - advice

    MlScoreBody:
      type: object
      properties:
        contestant1Id:
          type: integer
        contestant2Id:
          type: integer
      required:
        - contestant1Id
        - contestant2Id

    MlScoreResult:
      type: object
      properties:
        score:
          type: number
        breakdown:
          type: object
          properties:
            zodiacCompatibility:
              type: number
            personalityOverlap:
              type: number
            interestSimilarity:
              type: number
            ageCompatibility:
              type: number
          required:
            - zodiacCompatibility
            - personalityOverlap
            - interestSimilarity
            - ageCompatibility
        label:
          type: string
          enum: [excellent, good, moderate, poor]
      required:
        - score
        - breakdown
        - label

    LeaderboardEntry:
      type: object
      properties:
        rank:
          type: integer
        splitId:
          type: integer
        contestant1Name:
          type: string
        contestant2Name:
          type: string
        score:
          type: number
        label:
          type: string
      required:
        - rank
        - splitId
        - contestant1Name
        - contestant2Name
        - score
        - label

    GeminiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt
    GeminiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt
    CreateGeminiConversationBody:
      type: object
      properties:
        title:
          type: string
      required:
        - title
    SendGeminiMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content
    GeminiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/GeminiMessage"
      required:
        - id
        - title
        - createdAt
        - messages
    GenerateGeminiImageBody:
      type: object
      properties:
        prompt:
          type: string
      required:
        - prompt
    GenerateGeminiImageResponse:
      type: object
      properties:
        b64_json:
          type: string
        mimeType:
          type: string
      required:
        - b64_json
        - mimeType
    GeminiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    VillaEvent:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [contestant_joined, split_formed, split_broken, task_created, task_completed, vote_cast, contestant_dumped]
        title:
          type: string
        description:
          type: string
        relatedContestantIds:
          type: string
          nullable: true
        relatedSplitId:
          type: integer
          nullable: true
        relatedTaskId:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - type
        - title
        - description
        - createdAt
